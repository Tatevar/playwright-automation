services:
  tests:
    build:
      context: .
    environment:
      CI: "true"
      PLAYWRIGHT_BASE_URL: ${PLAYWRIGHT_BASE_URL:-https://dev-dubaicorp-front.scribex.io}
      ADMIN_EMAIL: ${ADMIN_EMAIL:?Set ADMIN_EMAIL in your shell or .env file}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:?Set ADMIN_PASSWORD in your shell or .env file}
    shm_size: "1gb"
    volumes:
      - ./playwright-report:/app/playwright-report
      - ./test-results:/app/test-results
    command: npm test
