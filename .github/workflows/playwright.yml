name: Playwright Tests
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:
jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    env:
      PLAYWRIGHT_BASE_URL: ${{ vars.PLAYWRIGHT_BASE_URL || 'https://dev-dubaicorp-front.scribex.io' }}
      ADMIN_EMAIL: ${{ secrets.ADMIN_EMAIL }}
      ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
    steps:
    - uses: actions/checkout@v4
    - name: Validate required secrets
      run: |
        if [ -z "$ADMIN_EMAIL" ] || [ -z "$ADMIN_PASSWORD" ]; then
          echo "Missing ADMIN_EMAIL or ADMIN_PASSWORD repository secrets."
          exit 1
        fi
    - name: Build Playwright test image
      run: docker build --tag playwright-demo-tests .
    - name: Run Playwright tests in Docker
      run: |
        docker run --rm \
          --shm-size=1g \
          -e CI=true \
          -e PLAYWRIGHT_BASE_URL \
          -e ADMIN_EMAIL \
          -e ADMIN_PASSWORD \
          -v "${{ github.workspace }}/playwright-report:/app/playwright-report" \
          -v "${{ github.workspace }}/test-results:/app/test-results" \
          playwright-demo-tests
    - uses: actions/upload-artifact@v4
      if: ${{ !cancelled() }}
      with:
        name: playwright-artifacts
        path: |
          playwright-report/
          test-results/
        retention-days: 30
